<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math AI Teacher</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --user-bg: #1f6feb;
      --teacher-bg: #21262d;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.1rem; margin: 0; font-weight: 600; }
    .header p { margin: 0.25rem 0 0; font-size: 0.85rem; color: var(--muted); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg { max-width: 85%; width: fit-content; }
    .msg.user { align-self: flex-end; }
    .msg.user .bubble { background: var(--user-bg); color: #fff; border-radius: 18px 18px 4px 18px; }
    .msg.teacher { align-self: flex-start; }
    .msg.teacher .bubble { background: var(--teacher-bg); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; }
    .bubble { padding: 0.85rem 1rem; white-space: pre-wrap; word-break: break-word; }
    .msg.teacher .label { font-size: 0.7rem; color: var(--accent); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .msg.teacher .block { margin-top: 0.75rem; }
    .msg.teacher .block:first-of-type { margin-top: 0; }
    .input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap; }
    .input-row input, .input-row textarea { flex: 1; min-width: 120px; }
    input, textarea {
      padding: 0.6rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: inherit;
    }
    textarea { min-height: 44px; resize: none; }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #f85149; font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header class="header">
    <h1>Math AI Teacher</h1>
    <p>Enter a math problem in numbers or words. Get an answer, difficulty, relevance to your topic, and an explanation.</p>
  </header>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <form id="form">
      <div class="input-row">
        <textarea id="problem" name="problem" rows="1" placeholder="e.g. What is 15% of 80? or Solve 2x + 3 = 11" required></textarea>
        <input type="text" id="topic" name="topic" placeholder="Topic (optional)" />
        <button type="submit" id="btn">Ask</button>
      </div>
    </form>
    <div id="error" class="error" style="display:none;"></div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
