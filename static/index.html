<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Content Scoring — Darcel-style API Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      margin-bottom: 1rem;
    }
    textarea { min-height: 100px; resize: vertical; }
    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .result h3 { font-size: 0.9rem; margin: 0 0 0.75rem 0; color: var(--muted); }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.easy { background: #238636; color: #fff; }
    .badge.medium { background: var(--warning); color: #000; }
    .badge.hard { background: var(--danger); color: #fff; }
    .score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 0.25rem 0; }
    .score-bar span { display: block; height: 100%; background: var(--accent); border-radius: 3px; }
    .answer-box { background: var(--bg); padding: 0.75rem; border-radius: 6px; margin-top: 0.5rem; }
    .error { color: var(--danger); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Math Content Scoring</h1>
    <p class="sub">Enter a math problem (text or equation). Get difficulty, quality, and an answer. Optionally link to a topic.</p>

    <form id="form">
      <label for="problem">Problem (text or equation, e.g. "Solve for x: 2x + 3 = 11")</label>
      <textarea id="problem" name="problem" required placeholder="e.g. What is 15% of 80? or 2*x + 3 = 11"></textarea>

      <label for="topic">Topic (optional) — is this a good question for this topic?</label>
      <input type="text" id="topic" name="topic" placeholder="e.g. algebra, fractions, percentages" />

      <label for="grade">Grade level (optional, 1–12)</label>
      <select id="grade" name="grade">
        <option value="">—</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option><option value="11">11</option><option value="12">12</option>
      </select>

      <label for="apikey">API Key (default works for local dev)</label>
      <input type="password" id="apikey" name="apikey" placeholder="dev-key-change-in-production" autocomplete="off" />

      <button type="submit" id="btn">Score & get answer</button>
    </form>

    <div id="error" class="error" style="display:none;"></div>
    <div id="result" class="result" style="display:none;"></div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
