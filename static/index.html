<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math AI Teacher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #2383e2;
      --accent-hover: #1a6bc7;
      --user-bg: #2383e2;
      --teacher-bg: #fff;
      --teacher-border: #e5e5e5;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 0.5rem 1rem 0.6rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header h1 { font-size: 15px; font-weight: 600; margin: 0; color: var(--text); }
    .header p { margin: 0.15rem 0 0; font-size: 12px; color: var(--muted); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .msg { max-width: 88%; width: fit-content; }
    .msg.user { align-self: flex-end; }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-radius: 12px 12px 4px 12px;
      padding: 0.5rem 0.75rem;
      font-size: 13px;
    }
    .msg.teacher { align-self: flex-start; }
    .msg.teacher .bubble {
      background: var(--teacher-bg);
      border: 1px solid var(--teacher-border);
      border-radius: 12px 12px 12px 4px;
      padding: 0.6rem 0.75rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .msg.teacher .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.2rem;
      letter-spacing: 0.02em;
    }
    .msg.teacher .block { margin-top: 0.5rem; font-size: 13px; }
    .msg.teacher .block:first-of-type { margin-top: 0; }
    .input-area {
      padding: 0.5rem 1rem 0.75rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row { display: flex; gap: 0.4rem; align-items: flex-end; }
    .input-row textarea { flex: 1; min-width: 0; }
    .input-row input[type="text"] { width: 120px; flex-shrink: 0; }
    input, textarea {
      padding: 0.4rem 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(35,131,226,0.15);
    }
    textarea { min-height: 36px; resize: none; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #c53030; font-size: 12px; margin-top: 0.35rem; }
  </style>
</head>
<body>
  <header class="header">
    <h1>Math AI Teacher</h1>
    <p>Ask a math problem in numbers or words. Get answer, difficulty, relevance, and explanation.</p>
  </header>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <form id="form">
      <div class="input-row">
        <textarea id="problem" name="problem" rows="1" placeholder="e.g. What is 15% of 80? or Solve 2x + 3 = 11" required></textarea>
        <input type="text" id="topic" name="topic" placeholder="Topic (optional)" />
        <button type="submit" id="btn">Ask</button>
      </div>
    </form>
    <div id="error" class="error" style="display:none;"></div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
